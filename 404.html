<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Seite nicht gefunden — Lukas Wagner</title>
  <meta name="robots" content="noindex" />
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;background:#0a0c11;color:#f5f6f8;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:2rem}
    .code{font-family:"Space Grotesk",system-ui,sans-serif;font-size:clamp(4rem,16vw,8rem);font-weight:700;line-height:1;background:linear-gradient(120deg,#8aa0ff,#5be0c0);-webkit-background-clip:text;background-clip:text;color:transparent}
    p{color:#c9cfda;margin:1rem 0 2rem;font-size:1.1rem}
    a{display:inline-flex;align-items:center;gap:.5rem;font-weight:600;border-radius:999px;padding:.75rem 1.5rem;background:linear-gradient(120deg,#8aa0ff,#5be0c0);color:#08231e;text-decoration:none;transition:transform .2s}
    a:hover{transform:translateY(-2px)}
  </style>
</head>
<body>
  <main>
    <div class="code">404</div>
    <p>Diese Seite gibt es (noch) nicht.</p>
    <a href="/">Zur Startseite</a>
  </main>
</body>
</html>
