<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lukas Wagner — Website folgt in Kürze</title>
  <meta name="description" content="Die neue Website von Lukas Wagner entsteht gerade. Bald hier." />
  <!-- Während der Coming-Soon-Phase NICHT indexieren: -->
  <meta name="robots" content="noindex, nofollow" />
  <meta name="theme-color" content="#0b0d12" />
  <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;✦&lt;/text&gt;&lt;/svg&gt;" />
  <style>
    :root {
      --bg: #0b0d12;
      --bg-2: #11141c;
      --fg: #f4f5f7;
      --muted: #9aa3b2;
      --accent: #6ea8fe;
      --line: rgba(255, 255, 255, 0.08);
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1a2030 0%, var(--bg) 55%) fixed, var(--bg);
      color: var(--fg);
      min-height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }
    main {
      max-width: 36rem;
      width: 100%;
      text-align: center;
    }
    .mark {
      font-size: 1.5rem;
      color: var(--accent);
      letter-spacing: 0.3em;
      margin-bottom: 2.5rem;
      opacity: 0.9;
    }
    h1 {
      font-size: clamp(2.2rem, 7vw, 3.6rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      line-height: 1.05;
    }
    .sub {
      margin-top: 0.6rem;
      font-size: clamp(0.95rem, 2.6vw, 1.1rem);
      color: var(--muted);
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .divider {
      width: 3rem;
      height: 1px;
      background: var(--line);
      margin: 2.25rem auto;
    }
    p.lead {
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      color: var(--fg);
      line-height: 1.6;
    }
    p.note {
      margin-top: 0.75rem;
      color: var(--muted);
      font-size: 0.95rem;
      line-height: 1.6;
    }
    .contact {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2.25rem;
      padding: 0.75rem 1.4rem;
      border: 1px solid var(--line);
      border-radius: 999px;
      color: var(--fg);
      text-decoration: none;
      font-size: 0.98rem;
      transition: border-color 0.2s ease, transform 0.2s ease, background 0.2s ease;
    }
    .contact:hover {
      border-color: var(--accent);
      background: rgba(110, 168, 254, 0.08);
      transform: translateY(-1px);
    }
    footer {
      margin-top: 3rem;
      color: var(--muted);
      font-size: 0.82rem;
      letter-spacing: 0.03em;
    }
    @media (prefers-reduced-motion: no-preference) {
      main { animation: rise 0.7s ease both; }
      @keyframes rise {
        from { opacity: 0; transform: translateY(12px); }
        to   { opacity: 1; transform: translateY(0); }
      }
    }
  </style>
</head>
<body>
  <main>
    <div class="mark">✦</div>
    <h1>Lukas&nbsp;Wagner</h1>
    <div class="sub">Website folgt in Kürze</div>

    <div class="divider"></div>

    <p class="lead">Hier entsteht gerade etwas Neues.</p>
    <p class="note">Die Seite wird derzeit komplett neu aufgebaut. Schau bald wieder vorbei&nbsp;— oder schreib mir direkt.</p>

    <a class="contact" href="mailto:kontakt@lukaswagner.at">
      <span aria-hidden="true">✉</span> kontakt@lukaswagner.at
    </a>

    <footer>© Lukas Wagner</footer>
  </main>
</body>
</html>
